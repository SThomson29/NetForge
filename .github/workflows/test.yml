name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, Development]

jobs:
  template-smoke-tests:
    name: Jinja2 template smoke tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jinja2 pyyaml

      - name: Run template smoke tests
        run: |
          pytest tests/test_generation.py::TestJinja2Templates \
            -v --tb=short

  generation-tests:
    name: Config generation fixture tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jinja2 pyyaml
          pip install ansible

      - name: Run generation fixture tests
        run: |
          pytest tests/test_generation.py \
            --ignore=tests/test_generation.py \
            -k "test_generate_scenario" \
            -v --tb=short
        env:
          ANSIBLE_BIN: ansible-playbook
