# ============================================================
# CX-ConfigGen Inventory
#
# Group naming convention drives the provisioning script:
#   <platform>_<stacking>
#
# Supported platforms : cx (AOS-CX)
# Supported stacking  : vsx | vsf | none (omit suffix)
#
# Examples:
#   [cx_vsx]   → AOS-CX, VSX stacking  (vsx.yml copied, vsf.yml skipped)
#   [cx_vsf]   → AOS-CX, VSF stacking  (vsf.yml copied, vsx.yml skipped)
#   [cx]       → AOS-CX, no stacking   (neither vsx.yml nor vsf.yml copied)
# ============================================================

[cx_vsx]
core-sw-01
core-sw-02

[cx_vsf]
# cx-sw-03

[cx:children]
cx_vsx
cx_vsf
