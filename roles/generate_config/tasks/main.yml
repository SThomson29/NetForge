---
# generate_config - tasks/main.yml
# Renders each configuration section template and assembles the final config file.
#
# SELECTIVE GENERATION - use --tags to render only specific sections:
#   ansible-playbook ... --tags vxlan
#   ansible-playbook ... --tags "bgp,vxlan,vrfs"
#   ansible-playbook ... --tags routing          # runs bgp, ospf, vrfs
#   ansible-playbook ... --tags interfaces       # runs all interface types
#   ansible-playbook ... --tags full             # runs everything (default)
#
# When using --tags for partial generation, the output file will be named
# <hostname>_PARTIAL_<tags>.cfg and will only contain the rendered sections.
# The 'always' tag ensures the output directory and assembly tasks always run.

- name: Ensure output directory exists
  ansible.builtin.file:
    path: "{{ config_output_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  tags: always

# --- Individual section tasks ---

- name: Render | StaticRoutes
  ansible.builtin.template:
    src: CX_staticroutes.j2
    dest: "{{ config_output_dir }}/{{ inventory_hostname }}_01_staticroutes.ios"
    mode: "0644"
  delegate_to: localhost
  tags: [full, staticroutes]

- name: Render | Management
  ansible.builtin.template:
    src: CX_management.j2
    dest: "{{ config_output_dir }}/{{ inventory_hostname }}_02_management.ios"
    mode: "0644"
  delegate_to: localhost
  tags: [full, management]

- name: Render | General
  ansible.builtin.template:
    src: CX_general.j2
    dest: "{{ config_output_dir }}/{{ inventory_hostname }}_03_general.ios"
