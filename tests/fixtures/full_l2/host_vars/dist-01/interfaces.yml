interface_groups:
  - name: 1Gig_access
    speed: 1g
  - name: 10Gig_uplinks
    speed: 10g
physical_interfaces:
  - name: "1/1/1"
    description: "Workstation access"
    admin: up
    mtu: 1500
    routed: false
    port_type: access
    access_vlan: "20"
    trunk_allowed_vlans: ""
    trunk_native_vlan: 1
  - name: "1/1/2"
    description: "VoIP phone"
    admin: up
    mtu: 1500
    routed: false
    port_type: access
    access_vlan: "40"
    trunk_allowed_vlans: ""
    trunk_native_vlan: 1
  - name: "1/1/3"
    description: "Trunk to access switch"
    admin: up
    mtu: 9198
    routed: false
    port_type: trunk
    access_vlan: ""
    trunk_allowed_vlans: "10,20,30,40,99"
    trunk_native_vlan: 99
  - name: "1/1/4"
    description: "Guest wireless AP"
    admin: up
    mtu: 1500
    routed: false
    port_type: trunk
    access_vlan: ""
    trunk_allowed_vlans: "30"
    trunk_native_vlan: 1
  - name: "1/1/5"
    description: "Admin down port"
    admin: down
    mtu: 9198
    routed: false
    port_type: access
    access_vlan: "10"
    trunk_allowed_vlans: ""
    trunk_native_vlan: 1
  - name: "1/1/48"
    description: "LAG member uplink"
    admin: up
    mtu: 9198
    lag_member: "lag1"
lag_interfaces:
  - name: lag1
    description: "Uplink to core"
    admin: up
    mtu: 9198
    lacp_mode: active
    routed: false
    port_type: trunk
    trunk_allowed_vlans: "all"
    trunk_native_vlan: 99
loopback_interfaces:
  - name: loopback0
    description: "Management loopback"
    ip_address: "10.255.1.1"
    ip_prefix: "32"
    vrf: ""
    ospf_area: ""
    ospf_process_id: 1
vlan_interfaces:
  - name: vlan10
    description: "Management SVI"
    admin: up
    vrf: mgmt
    ip_address: "10.10.0.1"
    ip_prefix: 24
    helper_addresses:
      - 10.0.0.67
    ospf_area: ""
    ospf_process_id: 1
    ospf_passive: true
    active_gateway_ip: "10.10.0.254"
    active_gateway_mac: "00:02:00:00:00:01"
    mtu_jumbo: false
  - name: vlan20
    description: "Production SVI"
    admin: up
    vrf: PROD
    ip_address: "10.20.0.1"
    ip_prefix: 24
    helper_addresses:
      - 10.0.0.67
      - 10.0.0.68
    ospf_area: ""
    ospf_process_id: 1
    ospf_passive: true
    active_gateway_ip: "10.20.0.254"
    active_gateway_mac: "00:02:00:00:00:02"
    mtu_jumbo: false
  - name: vlan30
    description: "Guest SVI"
    admin: up
    vrf: GUEST
    ip_address: "10.30.0.1"
    ip_prefix: 24
    helper_addresses: []
    ospf_area: ""
    ospf_process_id: 1
    ospf_passive: true
    active_gateway_ip: ""
    active_gateway_mac: ""
    mtu_jumbo: false
  - name: vlan100
    description: "Server SVI jumbo"
    admin: up
    vrf: PROD
    ip_address: "10.100.0.1"
    ip_prefix: 24
    helper_addresses:
      - 10.0.0.67
    ospf_area: "0.0.0.0"
    ospf_process_id: 1
    ospf_passive: false
    active_gateway_ip: "10.100.0.254"
    active_gateway_mac: "00:02:00:00:00:03"
    mtu_jumbo: true
