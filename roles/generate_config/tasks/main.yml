# --- Assembly ---

- name: Find rendered section files for this host
  ansible.builtin.find:
    paths: "{{ config_output_dir }}"
    patterns: "{{ inventory_hostname }}_[0-9][0-9]_*.ios"
  register: section_files
  delegate_to: localhost
  tags: always

- name: Get size of each section file
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ section_files.files }}"
  register: section_file_stats
  delegate_to: localhost
  tags: always

- name: Remove empty section files before assembly
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  loop: "{{ section_file_stats.results }}"
  when: item.stat.size == 0 or item.stat.size is not defined
  delegate_to: localhost
  tags: always

- name: Re-find section files after empty removal
  ansible.builtin.find:
    paths: "{{ config_output_dir }}"
    patterns: "{{ inventory_hostname }}_[0-9][0-9]_*.ios"
  register: section_files_final
  delegate_to: localhost
  tags: always

- name: Set output filename (full vs partial)
  ansible.builtin.set_fact:
    assembled_filename: >-
      {{
        inventory_hostname + '_FULL.ios'
        if ansible_run_tags | intersect(['full', 'untagged']) | length > 0
        else inventory_hostname + '_PARTIAL_' + (ansible_run_tags | sort | join('-')) + '.ios'
      }}
  delegate_to: localhost
  tags: always

- name: Assemble configuration file
  ansible.builtin.assemble:
    src: "{{ config_output_dir }}"
    dest: "{{ config_output_dir }}/{{ assembled_filename }}"
    regexp: "{{ inventory_hostname }}_[0-9][0-9]_.*\\.ios"
    delimiter: "\n! --- section break ---\n"
    mode: "0644"
  delegate_to: localhost
  tags: always

- name: Remove section files after assembly
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ section_files_final.files }}"
  delegate_to: localhost
  tags: always
